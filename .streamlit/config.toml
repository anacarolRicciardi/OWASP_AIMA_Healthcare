[theme]
primaryColor = "#1976D2"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f4f8"
textColor = "#1a1a2e"
font = "sans serif"

[server]
headless = true
maxUploadSize = 5

[browser]
gatherUsageStats = false

[client]
# Public deployment: don't leak Python tracebacks/internals to end users.
showErrorDetails = "none"
toolbarMode = "minimal"
